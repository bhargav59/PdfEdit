services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    networks:
      - pdfedit-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000
      - STORAGE_PATH=/storage
      - MAX_FILE_SIZE=52428800
      - FILE_TTL_SECONDS=7200
    volumes:
      - storage-data:/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pdfedit-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/storage
    volumes:
      - storage-data:/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pdfedit-net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - pdfedit-net

volumes:
  storage-data:

networks:
  pdfedit-net:
    driver: bridge
